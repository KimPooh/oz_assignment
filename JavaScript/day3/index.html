<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Day3 - 암호화폐 가격 변동 추적기</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./crypto-tracker.js" defer></script>
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <nav class="top-nav" aria-label="JavaScript Day3 메뉴">
                <a href="../../index.html">과제 목록</a>
            </nav>
            <div class="hero">
                <p class="eyebrow">JavaScript Day3</p>
                <h1>암호화폐 가격 변동 추적기</h1>
                <p>
                    Binance 24시간 가격 변동 데이터를 1초마다 갱신하고, USDT 마켓만 모아 관심 항목을 저장합니다.
                </p>
            </div>
        </header>

        <section class="summary-grid" aria-label="시장 요약">
            <article class="summary-card">
                <span class="summary-label">USDT 종목</span>
                <strong data-total-count>0</strong>
            </article>
            <article class="summary-card">
                <span class="summary-label">관심 항목</span>
                <strong data-favorite-count>0</strong>
            </article>
            <article class="summary-card">
                <span class="summary-label">최고 상승</span>
                <strong data-top-gainer>-</strong>
            </article>
            <article class="summary-card">
                <span class="summary-label">마지막 갱신</span>
                <strong data-updated-at>-</strong>
            </article>
        </section>

        <section class="market-panel" aria-labelledby="market-title">
            <div class="panel-toolbar">
                <div>
                    <p class="eyebrow">Live Market</p>
                    <h2 id="market-title">USDT 마켓</h2>
                </div>

                <label class="search-box">
                    <span class="sr-only">암호화폐 검색</span>
                    <input type="search" data-search-input placeholder="BTC, ETH, DOGE 검색">
                    <button type="button" data-clear-search aria-label="검색어 지우기">×</button>
                </label>
            </div>

            <div class="tab-list" role="tablist" aria-label="목록 보기 방식">
                <button class="tab-button active" type="button" data-tab="all" role="tab" aria-selected="true">전체보기</button>
                <button class="tab-button" type="button" data-tab="favorites" role="tab" aria-selected="false">관심항목 보기</button>
            </div>

            <p class="status-line" data-status>데이터를 불러오는 중입니다.</p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th scope="col">관심</th>
                            <th scope="col">종목</th>
                            <th scope="col">현재가</th>
                            <th scope="col">24시간 변동률</th>
                            <th scope="col">24시간 거래대금</th>
                            <th scope="col">고가 / 저가</th>
                        </tr>
                    </thead>
                    <tbody data-market-list>
                        <tr>
                            <td colspan="6" class="empty-cell">데이터를 기다리고 있습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
